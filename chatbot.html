<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestie AI 💗</title>
    <link rel="stylesheet" href="css/chatbot.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Bestie AI 💬
    </div>

    <div class="chat-body" id="chatBody">
        <div class="bot-message">Hey pookie 🫶 How are you feeling today?</div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type here, bestie...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function getBotReply(message) {
    message = message.toLowerCase();

    if (message.includes("sad") || message.includes("cry") || message.includes("down")) {
        return "Oh no bestie 🥺 come here 🫂 you’re stronger than you think. I’m with you.";
    } 
    else if (message.includes("happy") || message.includes("excited")) {
        return "YAYYY I love this energy for you 💃✨ keep shining, main character!";
    } 
    else if (message.includes("tired") || message.includes("sleep")) {
        return "Aww you need rest, not pressure 😴 drink some water and take it slow okay?";
    } 
    else if (message.includes("angry") || message.includes("mad")) {
        return "Deep breaths bestie 🖤 you’re allowed to feel, but don’t let it steal your peace.";
    } 
    else {
        return "Tell me more… I’m listening 🫶";
    }
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (message === "") return;

    const chatBody = document.getElementById("chatBody");
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    const userDiv = document.createElement("div");
    userDiv.className = "user-message";
    userDiv.innerHTML = `<span>${message}</span><small>${time}</small>`;
    chatBody.appendChild(userDiv);

    input.value = "";

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.innerText = "Bestie is typing...";
    chatBody.appendChild(typing);
    chatBody.scrollTop = chatBody.scrollHeight;

    setTimeout(() => {
        typing.remove();
        const botDiv = document.createElement("div");
        botDiv.className = "bot-message";
        const reply = getBotReply(message);
        botDiv.innerHTML = `<span>${reply}</span><small>${time}</small>`;
        chatBody.appendChild(botDiv);
        chatBody.scrollTop = chatBody.scrollHeight;
    }, 1200);
}
</script>


</body>
</html>
